<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="#0F141C"/>
  <!-- Candlestick 1: bearish (red) -->
  <line x1="10" y1="8" x2="10" y2="40" stroke="#D63A50" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="6.5" y="16" width="7" height="14" fill="#D63A50" rx="1"/>
  <!-- Candlestick 2: bullish (green) -->
  <line x1="24" y1="10" x2="24" y2="42" stroke="#0F9D52" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="20.5" y="24" width="7" height="12" fill="#0F9D52" rx="1"/>
  <!-- Candlestick 3: bullish (green) -->
  <line x1="38" y1="6" x2="38" y2="34" stroke="#0F9D52" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="34.5" y="10" width="7" height="16" fill="#0F9D52" rx="1"/>
</svg>
